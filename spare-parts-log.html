<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a2332">
<title>Spare Parts Log · 备件领用</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  :root {
    --bg: #0f1722;
    --bg-2: #1a2332;
    --bg-3: #243245;
    --line: #2d3e54;
    --line-soft: #1f2a3a;
    --text: #e8edf4;
    --text-2: #9aa8bd;
    --text-3: #5a6b85;
    --accent: #4ecdc4;
    --accent-2: #ffa94d;
    --warn: #ff6b6b;
    --green: #51cf66;
    --shadow: 0 4px 12px rgba(0,0,0,0.3);
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    overscroll-behavior: none;
    font-size: 15px;
  }
  body { padding-bottom: 90px; }

  .container { max-width: 720px; margin: 0 auto; padding: 16px; }

  /* Header */
  .header {
    padding: 20px 0 16px;
    border-bottom: 1px solid var(--line-soft);
    margin-bottom: 16px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header .badge {
    background: var(--accent);
    color: var(--bg);
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.05em;
    font-family: 'JetBrains Mono', monospace;
  }
  .header .sub { color: var(--text-3); font-size: 12px; margin-top: 4px; font-family: 'JetBrains Mono', monospace; }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    background: var(--bg-2);
    padding: 4px;
    border-radius: 10px;
  }
  .tab {
    flex: 1;
    background: none;
    border: none;
    padding: 10px 4px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-2);
    cursor: pointer;
    border-radius: 7px;
    transition: all 0.2s;
  }
  .tab.active { background: var(--bg-3); color: var(--text); box-shadow: var(--shadow); }

  /* Cards */
  .card {
    background: var(--bg-2);
    border: 1px solid var(--line-soft);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 12px;
  }
  .card-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-3);
    margin-bottom: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  /* Summary tiles */
  .summary {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  .tile {
    background: var(--bg-2);
    border: 1px solid var(--line-soft);
    border-radius: 12px;
    padding: 16px;
  }
  .tile .label {
    font-size: 11px;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .tile .value {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    font-family: 'JetBrains Mono', monospace;
  }
  .tile .meta { font-size: 12px; color: var(--text-2); margin-top: 4px; }
  .tile .value.accent { color: var(--accent); }
  .tile .value.orange { color: var(--accent-2); }

  /* Form fields */
  label.field-label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-3);
    margin-bottom: 6px;
  }
  input, select, textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--line);
    padding: 12px 14px;
    font-family: inherit;
    font-size: 15px;
    color: var(--text);
    border-radius: 8px;
    -webkit-appearance: none;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
  input::placeholder { color: var(--text-3); }

  .form-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .form-row > * { flex: 1; }
  .form-row > .grow-2 { flex: 2; }
  .form-group { margin-bottom: 12px; }

  /* Buttons */
  button.btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 13px 20px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }
  button.btn:hover { filter: brightness(1.1); }
  button.btn:active { transform: scale(0.98); }
  button.btn:disabled { opacity: 0.4; cursor: not-allowed; }

  button.btn-ghost {
    background: var(--bg-3);
    color: var(--text);
  }
  button.btn-ghost:hover { background: var(--line); }

  button.btn-danger { background: var(--warn); color: var(--bg); }
  button.btn-warn { background: var(--accent-2); color: var(--bg); }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--line);
    padding: 28px 16px;
    text-align: center;
    cursor: pointer;
    background: var(--bg);
    border-radius: 10px;
    transition: all 0.2s;
  }
  .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); background: rgba(78, 205, 196, 0.05); }
  .upload-zone .icon { font-size: 28px; margin-bottom: 6px; }
  .upload-zone .text { font-weight: 500; }
  .upload-zone .hint { font-size: 11px; color: var(--text-3); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
  #fileInput, #importFile { display: none; }

  /* Item rows */
  .item-row {
    display: grid;
    grid-template-columns: 1fr 70px 36px;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
  }
  .item-row input { padding: 10px 12px; }
  .item-row .remove-btn {
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--warn);
    width: 36px; height: 38px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
  }
  .item-row .remove-btn:hover { background: var(--warn); color: var(--bg); }

  .add-item-btn {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--line);
    color: var(--text-2);
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    margin-top: 4px;
  }
  .add-item-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Autocomplete suggestions */
  .input-wrap { position: relative; }
  .suggestions {
    position: absolute;
    top: 100%;
    left: 0; right: 0;
    background: var(--bg-3);
    border: 1px solid var(--line);
    border-radius: 8px;
    margin-top: 4px;
    max-height: 200px;
    overflow-y: auto;
    z-index: 10;
    box-shadow: var(--shadow);
    display: none;
  }
  .suggestions.show { display: block; }
  .suggestion-item {
    padding: 10px 12px;
    cursor: pointer;
    font-size: 14px;
    border-bottom: 1px solid var(--line-soft);
  }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover, .suggestion-item.active { background: var(--line); }
  .suggestion-item .count { color: var(--text-3); font-size: 11px; float: right; font-family: 'JetBrains Mono', monospace; }

  /* Logs list */
  .log-entry {
    background: var(--bg-2);
    border: 1px solid var(--line-soft);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .log-entry:hover { border-color: var(--accent); }
  .log-entry .head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }
  .log-entry .ref {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-3);
    margin-bottom: 2px;
  }
  .log-entry .customer { font-weight: 600; font-size: 15px; }
  .log-entry .model {
    background: var(--bg-3);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
  }
  .log-entry .date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-3);
    margin-top: 4px;
  }
  .log-entry .items {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .log-entry .item-tag {
    background: var(--bg);
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 12px;
    color: var(--text-2);
  }
  .log-entry .item-tag .qty {
    color: var(--accent);
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    margin-left: 4px;
  }

  /* Stats list */
  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--line-soft);
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-row .name { font-weight: 500; }
  .stat-row .bar-wrap {
    flex: 1;
    margin: 0 12px;
    height: 6px;
    background: var(--bg);
    border-radius: 3px;
    overflow: hidden;
  }
  .stat-row .bar { height: 100%; background: var(--accent); border-radius: 3px; }
  .stat-row .qty {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    color: var(--accent);
    min-width: 40px;
    text-align: right;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--text-3);
  }
  .empty-state .icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }
  .empty-state .text { font-size: 14px; }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.7);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 100;
  }
  @media (min-width: 640px) {
    .modal-bg { align-items: center; padding: 20px; }
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--bg-2);
    width: 100%;
    max-width: 540px;
    max-height: 92vh;
    overflow-y: auto;
    padding: 22px;
    border-top-left-radius: 16px;
    border-top-right-radius: 16px;
    border: 1px solid var(--line);
  }
  @media (min-width: 640px) { .modal { border-radius: 16px; } }
  .modal h2 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal h2 .close {
    background: var(--bg-3);
    border: none;
    color: var(--text);
    width: 30px; height: 30px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
  }

  /* Charts */
  .chart-container { position: relative; height: 240px; }

  /* OCR status */
  .ocr-status {
    margin-top: 10px;
    padding: 10px;
    border-radius: 6px;
    font-size: 13px;
    text-align: center;
    background: var(--bg);
  }
  .ocr-status.success { color: var(--green); border: 1px solid var(--green); }
  .ocr-status.error { color: var(--warn); border: 1px solid var(--warn); }
  .ocr-status.loading { color: var(--accent); border: 1px solid var(--accent); }

  .preview-img { max-width: 100%; max-height: 240px; border-radius: 8px; margin: 10px 0; border: 1px solid var(--line); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-3);
    color: var(--text);
    padding: 12px 22px;
    border-radius: 8px;
    font-size: 14px;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    box-shadow: var(--shadow);
    border: 1px solid var(--line);
  }
  .toast.show { opacity: 1; }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 60px; height: 60px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-size: 28px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(78, 205, 196, 0.4);
    z-index: 50;
  }
  .fab:hover { transform: scale(1.05); }

  /* Loading spinner */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--line);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .hidden { display: none !important; }
  
  .small-link { font-size: 12px; color: var(--accent); cursor: pointer; }
  .small-link:hover { text-decoration: underline; }

  .month-picker {
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    width: auto;
  }

  .filter-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }
  .chip {
    background: var(--bg-3);
    color: var(--text-2);
    padding: 5px 10px;
    border-radius: 14px;
    font-size: 12px;
    border: 1px solid var(--line-soft);
    cursor: pointer;
  }
  .chip.active { background: var(--accent); color: var(--bg); font-weight: 600; }

  .stat-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 14px;
    background: var(--bg);
    padding: 3px;
    border-radius: 8px;
  }
  .stat-tab {
    flex: 1;
    background: none;
    border: none;
    color: var(--text-2);
    padding: 8px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    border-radius: 6px;
    font-weight: 500;
  }
  .stat-tab.active { background: var(--bg-3); color: var(--text); }
</style>
</head>
<body>

<div class="container">
  <header class="header">
    <h1>Spare Parts Log <span class="badge">TECH</span></h1>
    <div class="sub">Service Department · Daily Requisition</div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="add">+ 新增</button>
    <button class="tab" data-tab="logs">记录</button>
    <button class="tab" data-tab="stats">统计</button>
    <button class="tab" data-tab="settings">设置</button>
  </nav>

  <!-- ADD TAB -->
  <section id="tab-add" class="tab-content">
    <div class="card">
      <div class="card-title">📷 扫描表单（可选）</div>
      <label for="fileInput" class="upload-zone" id="uploadZone">
        <div class="icon">📄</div>
        <div class="text">点击拍照或选择图片</div>
        <div class="hint">系统会自动填入下方表单 · 你可修改</div>
      </label>
      <input type="file" id="fileInput" accept="image/*" capture="environment">
      <div id="ocrStatus"></div>
      <img id="previewImg" class="preview-img hidden" />
    </div>

    <div class="card">
      <div class="card-title">📋 表单信息</div>
      <div class="form-row">
        <div>
          <label class="field-label">日期</label>
          <input type="date" id="inDate">
        </div>
        <div>
          <label class="field-label">Ref No</label>
          <input type="text" id="inRefNo" placeholder="1233">
        </div>
      </div>
      
      <div class="form-group">
        <label class="field-label">客户名 Customer</label>
        <div class="input-wrap">
          <input type="text" id="inCustomer" placeholder="如:Hey Stationery" autocomplete="off">
          <div class="suggestions" id="customerSuggestions"></div>
        </div>
      </div>
      
      <div class="form-group">
        <label class="field-label">机器型号 Model</label>
        <div class="input-wrap">
          <input type="text" id="inModel" placeholder="如:MPC 3004" autocomplete="off">
          <div class="suggestions" id="modelSuggestions"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🔧 物料清单 Items</div>
      <div id="itemsContainer"></div>
      <button class="add-item-btn" id="addItemBtn">+ 添加物料</button>
    </div>

    <button class="btn" id="saveBtn" style="width:100%; padding: 16px; font-size: 15px;">💾 保 存 这 张 表</button>
  </section>

  <!-- LOGS TAB -->
  <section id="tab-logs" class="tab-content hidden">
    <div class="summary">
      <div class="tile">
        <div class="label">本月表单</div>
        <div class="value accent" id="monthForms">0</div>
        <div class="meta" id="monthFormsLabel">张</div>
      </div>
      <div class="tile">
        <div class="label">本月物料</div>
        <div class="value orange" id="monthItems">0</div>
        <div class="meta">件总数</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        <span>领用记录</span>
        <select class="month-picker" id="logsMonthPicker"></select>
      </div>
      <div id="logsList"></div>
    </div>
  </section>

  <!-- STATS TAB -->
  <section id="tab-stats" class="tab-content hidden">
    <div class="card">
      <div class="card-title">
        <span>月度统计</span>
        <select class="month-picker" id="statsMonthPicker"></select>
      </div>
      
      <div class="stat-tabs">
        <button class="stat-tab active" data-stat="parts">按物料</button>
        <button class="stat-tab" data-stat="customers">按客户</button>
        <button class="stat-tab" data-stat="models">按型号</button>
      </div>

      <div id="statsList"></div>
    </div>

    <div class="card">
      <div class="card-title">每日表单数趋势</div>
      <div class="chart-container"><canvas id="trendChart"></canvas></div>
    </div>
  </section>

  <!-- SETTINGS TAB -->
  <section id="tab-settings" class="tab-content hidden">
    <div class="card">
      <div class="card-title">🔑 OCR API</div>
      <label class="field-label">Google Cloud Vision API Key</label>
      <input type="password" id="apiKeyInput" placeholder="AIza...">
      <div style="font-size: 11px; color: var(--text-3); margin-top: 8px; line-height: 1.5;">
        Google Cloud Console → 启用 Vision API → 创建 API Key。每月 1000 次免费,自用足够。仅存于本地浏览器。
      </div>
      <button class="btn" id="saveApiKey" style="margin-top: 12px;">保存 API Key</button>
    </div>

    <div class="card">
      <div class="card-title">👤 我的信息</div>
      <label class="field-label">技术员名字（自动填入新表单）</label>
      <input type="text" id="techNameInput" placeholder="SAIFU">
      <button class="btn" id="saveTechName" style="margin-top: 12px;">保存</button>
    </div>

    <div class="card">
      <div class="card-title">💾 数据</div>
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <button class="btn btn-ghost" id="exportCsv">📊 导出 CSV（给老板看）</button>
        <button class="btn btn-ghost" id="exportJson">📦 导出 JSON 备份</button>
        <button class="btn btn-ghost" id="importJsonBtn">📥 导入 JSON 备份</button>
        <input type="file" id="importFile" accept=".json">
        <button class="btn btn-danger" id="clearData" style="margin-top: 8px;">⚠ 清空所有数据</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📚 数据字典</div>
      <div style="font-size: 13px; color: var(--text-2); margin-bottom: 10px;">
        系统会记住你用过的物料/客户/型号,下次自动建议。
      </div>
      <div id="dictStats" style="font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-3);"></div>
    </div>
  </section>
</div>

<button class="fab" id="fab" title="快速添加">+</button>

<!-- Detail modal -->
<div class="modal-bg" id="detailModal">
  <div class="modal">
    <h2>
      <span>表单详情</span>
      <button class="close" id="closeDetail">×</button>
    </h2>
    <div id="detailContent"></div>
    <div style="display: flex; gap: 8px; margin-top: 16px;">
      <button class="btn btn-ghost" id="editForm" style="flex:1;">✏️ 编辑</button>
      <button class="btn btn-danger" id="deleteForm" style="flex:1;">🗑 删除</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============== DATA LAYER ==============
const DB_NAME = 'sparePartsDB';
const DB_VERSION = 1;
let db;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('forms')) {
        const s = d.createObjectStore('forms', { keyPath: 'id', autoIncrement: true });
        s.createIndex('date', 'date');
      }
      if (!d.objectStoreNames.contains('settings')) {
        d.createObjectStore('settings', { keyPath: 'key' });
      }
      if (!d.objectStoreNames.contains('dict')) {
        // type: 'part' | 'customer' | 'model'
        const s = d.createObjectStore('dict', { keyPath: ['type', 'name'] });
        s.createIndex('type', 'type');
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = (e) => reject(e);
  });
}

const Data = {
  addForm(f) {
    return new Promise((res, rej) => {
      const tx = db.transaction('forms', 'readwrite');
      const r = tx.objectStore('forms').add(f);
      r.onsuccess = () => res(r.result);
      r.onerror = rej;
    });
  },
  updateForm(f) {
    return new Promise((res, rej) => {
      const tx = db.transaction('forms', 'readwrite');
      const r = tx.objectStore('forms').put(f);
      r.onsuccess = () => res(r.result);
      r.onerror = rej;
    });
  },
  deleteForm(id) {
    return new Promise((res, rej) => {
      const tx = db.transaction('forms', 'readwrite');
      const r = tx.objectStore('forms').delete(id);
      r.onsuccess = () => res();
      r.onerror = rej;
    });
  },
  getAllForms() {
    return new Promise((res, rej) => {
      const tx = db.transaction('forms', 'readonly');
      const r = tx.objectStore('forms').getAll();
      r.onsuccess = () => res(r.result.sort((a,b) => b.date.localeCompare(a.date) || (b.id - a.id)));
      r.onerror = rej;
    });
  },
  clearAllForms() {
    return new Promise((res, rej) => {
      const tx = db.transaction(['forms', 'dict'], 'readwrite');
      tx.objectStore('forms').clear();
      tx.objectStore('dict').clear();
      tx.oncomplete = res;
      tx.onerror = rej;
    });
  },
  getSetting(key) {
    return new Promise((res) => {
      const tx = db.transaction('settings', 'readonly');
      const r = tx.objectStore('settings').get(key);
      r.onsuccess = () => res(r.result?.value);
      r.onerror = () => res(undefined);
    });
  },
  setSetting(key, value) {
    return new Promise((res, rej) => {
      const tx = db.transaction('settings', 'readwrite');
      const r = tx.objectStore('settings').put({ key, value });
      r.onsuccess = () => res();
      r.onerror = rej;
    });
  },
  // Dictionary: track frequency of parts/customers/models
  bumpDict(type, name) {
    if (!name || !name.trim()) return Promise.resolve();
    const trimmed = name.trim();
    return new Promise((res, rej) => {
      const tx = db.transaction('dict', 'readwrite');
      const store = tx.objectStore('dict');
      const getReq = store.get([type, trimmed]);
      getReq.onsuccess = () => {
        const existing = getReq.result;
        const entry = existing 
          ? { ...existing, count: existing.count + 1, lastUsed: Date.now() }
          : { type, name: trimmed, count: 1, lastUsed: Date.now() };
        store.put(entry);
      };
      tx.oncomplete = res;
      tx.onerror = rej;
    });
  },
  getDict(type) {
    return new Promise((res, rej) => {
      const tx = db.transaction('dict', 'readonly');
      const idx = tx.objectStore('dict').index('type');
      const r = idx.getAll(type);
      r.onsuccess = () => res(r.result.sort((a,b) => b.count - a.count));
      r.onerror = rej;
    });
  }
};

// ============== UTILS ==============
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

// Normalize part name for grouping (case insensitive, trim, collapse spaces)
function normalizePart(name) {
  return String(name || '').trim().toLowerCase().replace(/\s+/g, ' ');
}

// ============== OCR ==============
async function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result.split(',')[1]);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

async function ocrImage(file) {
  const apiKey = await Data.getSetting('apiKey');
  if (!apiKey) throw new Error('请先到「设置」填入 Google Cloud Vision API Key');
  
  const base64 = await fileToBase64(file);
  const body = {
    requests: [{
      image: { content: base64 },
      features: [
        { type: 'DOCUMENT_TEXT_DETECTION', maxResults: 1 }
      ]
    }]
  };
  
  const res = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${apiKey}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || '识别失败,检查 API Key 和网络');
  }
  
  const data = await res.json();
  return data.responses[0]?.fullTextAnnotation?.text || '';
}

// Parse spare-part form text into structured data
async function parseFormText(text) {
  const result = { date: '', refNo: '', customer: '', model: '', items: [] };
  if (!text) return result;
  
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  
  // Ref No: usually 3-5 digits after "REF NO" or standalone
  const refMatch = text.match(/REF\s*NO[:\s]*(\d{3,6})/i);
  if (refMatch) result.refNo = refMatch[1];
  
  // Date: DD/MM/YYYY or D/M/YYYY
  const dateMatch = text.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if (dateMatch) {
    let [, d, m, y] = dateMatch;
    if (y.length === 2) y = '20' + y;
    if (parseInt(m) > 12 && parseInt(d) <= 12) [d, m] = [m, d]; // swap if seems wrong
    result.date = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }
  
  // Model: try to find e.g. "MPC 3004", "MP C3004", "IM C2000", "IM C3000"
  const modelMatch = text.match(/\b(M\s?P\s?C|IM\s?C|MP|IM)\s*(\d{3,5})\b/i);
  if (modelMatch) result.model = modelMatch[0].replace(/\s+/g, ' ').toUpperCase().replace(/\s/g, ' ').trim();
  
  // Customer: hard to parse without anchors; try to find name after "CUSTOMER NAME"
  const custMatch = text.match(/CUSTOMER\s*NAME[\s:]*([^\n\r]+)/i);
  if (custMatch) {
    let c = custMatch[1].trim().split(/\s{2,}/)[0].slice(0, 40);
    if (c.length > 1 && c.length < 40) result.customer = c;
  }
  
  // Items: look for known part keywords
  const partKeywords = [
    'drum', 'toner', 'roller', 'belt', 'fuser', 'cleaning', 'blade', 
    'developer', 'transfer', 'pickup', 'pick up', 'pick-up', 'charger',
    'adf', 'feed', 'separation', 'magnet', 'screw', 'gear', 'bushing',
    'lamp', 'sensor', 'cartridge', 'unit', 'kit', 'cleaner'
  ];
  
  // Heuristic: scan lines for part keywords + nearby quantity
  const seenParts = new Set();
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const lower = line.toLowerCase();
    
    if (partKeywords.some(k => lower.includes(k))) {
      // Try to find a number 1-9 in same line or nearby line as qty
      let qty = 1;
      const qtyMatch = line.match(/\b([1-9]|10)\b/);
      if (qtyMatch) qty = parseInt(qtyMatch[1]);
      
      // Clean part name (remove qty, special chars)
      let partName = line
        .replace(/\b\d+\b/g, '')
        .replace(/[|*#=]/g, '')
        .replace(/MPC?\s*\d+/gi, '')
        .replace(/IM\s*C?\s*\d+/gi, '')
        .trim();
      
      // Heuristic: handle Toner C / Toner M / Toner Y / Toner K
      const tonerMatch = partName.match(/toner\s*[CMYK]\b/i);
      if (tonerMatch) partName = tonerMatch[0].toUpperCase();
      
      const norm = normalizePart(partName);
      if (norm && norm.length >= 3 && norm.length <= 50 && !seenParts.has(norm)) {
        seenParts.add(norm);
        result.items.push({ name: partName.slice(0, 50), qty });
      }
    }
  }
  
  // If no items detected, try another pass: lines with just "<word> <number>" pattern
  if (result.items.length === 0) {
    for (const line of lines) {
      const m = line.match(/^([A-Za-z][A-Za-z\s\-]{2,30})\s+([1-9]|10)\s*$/);
      if (m) result.items.push({ name: m[1].trim(), qty: parseInt(m[2]) });
    }
  }
  
  return result;
}

const itemsContainer = document.getElementById('itemsContainer');

function addItemRow(name = '', qty = 1) {
  const row = document.createElement('div');
  row.className = 'item-row';
  row.innerHTML = `
    <div class="input-wrap">
      <input type="text" class="item-name" placeholder="物料名（如:Drum）" value="${escapeHtml(name)}" autocomplete="off">
      <div class="suggestions"></div>
    </div>
    <input type="number" class="item-qty" min="1" placeholder="数量" value="${qty}">
    <button type="button" class="remove-btn" title="删除">×</button>
  `;
  itemsContainer.appendChild(row);
  
  const nameInput = row.querySelector('.item-name');
  const sugBox = row.querySelector('.suggestions');
  setupAutocomplete(nameInput, sugBox, 'part');
  
  row.querySelector('.remove-btn').addEventListener('click', () => {
    row.remove();
    if (itemsContainer.children.length === 0) addItemRow();
  });
  return row;
}

function clearItemRows() {
  itemsContainer.innerHTML = '';
}

function getItems() {
  return [...itemsContainer.querySelectorAll('.item-row')].map(r => ({
    name: r.querySelector('.item-name').value.trim(),
    qty: parseInt(r.querySelector('.item-qty').value) || 0
  })).filter(it => it.name && it.qty > 0);
}

document.getElementById('addItemBtn').addEventListener('click', () => addItemRow());

// ============== AUTOCOMPLETE ==============
async function setupAutocomplete(input, sugBox, type) {
  let entries = [];
  let active = -1;
  
  const refresh = async () => { entries = await Data.getDict(type); };
  await refresh();
  
  const render = (filter) => {
    const f = filter.trim().toLowerCase();
    const matches = entries.filter(e => e.name.toLowerCase().includes(f)).slice(0, 6);
    if (matches.length === 0 || !f) { sugBox.classList.remove('show'); return; }
    sugBox.innerHTML = matches.map((e, i) => 
      `<div class="suggestion-item ${i === active ? 'active' : ''}" data-name="${escapeHtml(e.name)}">${escapeHtml(e.name)}<span class="count">×${e.count}</span></div>`
    ).join('');
    sugBox.classList.add('show');
    sugBox.querySelectorAll('.suggestion-item').forEach(el => {
      el.addEventListener('mousedown', (ev) => {
        ev.preventDefault();
        input.value = el.dataset.name;
        sugBox.classList.remove('show');
      });
    });
  };
  
  input.addEventListener('input', () => { active = -1; render(input.value); });
  input.addEventListener('focus', async () => { await refresh(); render(input.value); });
  input.addEventListener('blur', () => setTimeout(() => sugBox.classList.remove('show'), 150));
  input.addEventListener('keydown', (e) => {
    const items = sugBox.querySelectorAll('.suggestion-item');
    if (e.key === 'ArrowDown') { e.preventDefault(); active = Math.min(active + 1, items.length - 1); render(input.value); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); active = Math.max(active - 1, 0); render(input.value); }
    else if (e.key === 'Enter' && active >= 0 && items[active]) {
      e.preventDefault();
      input.value = items[active].dataset.name;
      sugBox.classList.remove('show');
    }
  });
}

// ============== ADD: OCR ==============
const fileInput = document.getElementById('fileInput');
const ocrStatus = document.getElementById('ocrStatus');
const previewImg = document.getElementById('previewImg');

fileInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  
  const url = URL.createObjectURL(file);
  previewImg.src = url;
  previewImg.classList.remove('hidden');
  
  ocrStatus.className = 'ocr-status loading';
  ocrStatus.innerHTML = '<span class="spinner"></span>识别中...请稍候';
  
  try {
    const text = await ocrImage(file);
    const parsed = await parseFormText(text);
    
    if (parsed.date) document.getElementById('inDate').value = parsed.date;
    if (parsed.refNo) document.getElementById('inRefNo').value = parsed.refNo;
    if (parsed.customer) document.getElementById('inCustomer').value = parsed.customer;
    if (parsed.model) document.getElementById('inModel').value = parsed.model;
    
    if (parsed.items.length) {
      clearItemRows();
      parsed.items.forEach(it => addItemRow(it.name, it.qty));
    }
    
    ocrStatus.className = 'ocr-status success';
    ocrStatus.innerHTML = `✓ 识别完成,检测到 ${parsed.items.length} 项物料 · 请检查并修改`;
  } catch (err) {
    ocrStatus.className = 'ocr-status error';
    ocrStatus.innerHTML = '✗ ' + err.message;
  }
});

// ============== ADD: Save ==============
document.getElementById('saveBtn').addEventListener('click', async () => {
  const date = document.getElementById('inDate').value;
  const refNo = document.getElementById('inRefNo').value.trim();
  const customer = document.getElementById('inCustomer').value.trim();
  const model = document.getElementById('inModel').value.trim();
  const items = getItems();
  
  if (!date) { showToast('请填写日期'); return; }
  if (items.length === 0) { showToast('至少添加一项物料'); return; }
  
  const isEditing = document.getElementById('saveBtn').dataset.editId;
  const formData = {
    date, refNo, customer, model, items,
    createdAt: Date.now()
  };
  
  if (isEditing) {
    formData.id = parseInt(isEditing);
    await Data.updateForm(formData);
    document.getElementById('saveBtn').removeAttribute('data-edit-id');
    document.getElementById('saveBtn').textContent = '💾 保 存 这 张 表';
    showToast('✓ 已更新');
  } else {
    await Data.addForm(formData);
    showToast('✓ 已保存');
  }
  
  // Update dictionaries
  if (customer) await Data.bumpDict('customer', customer);
  if (model) await Data.bumpDict('model', model);
  for (const it of items) await Data.bumpDict('part', it.name);
  
  // Reset
  document.getElementById('inRefNo').value = '';
  document.getElementById('inCustomer').value = '';
  document.getElementById('inModel').value = '';
  document.getElementById('inDate').value = todayStr();
  clearItemRows();
  addItemRow();
  previewImg.classList.add('hidden');
  ocrStatus.innerHTML = '';
  fileInput.value = '';
  
  switchTab('logs');
});

// ============== LOGS TAB ==============
async function renderLogs() {
  const all = await Data.getAllForms();
  
  // Month picker
  const months = [...new Set(all.map(f => f.date.slice(0, 7)))].sort().reverse();
  if (months.length === 0) months.push(todayStr().slice(0, 7));
  const picker = document.getElementById('logsMonthPicker');
  const prev = picker.value;
  picker.innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join('');
  if (prev && months.includes(prev)) picker.value = prev;
  
  const month = picker.value;
  const monthForms = all.filter(f => f.date.startsWith(month));
  const totalItems = monthForms.reduce((s, f) => s + f.items.reduce((s2, it) => s2 + (it.qty || 0), 0), 0);
  
  document.getElementById('monthForms').textContent = monthForms.length;
  document.getElementById('monthFormsLabel').textContent = monthForms.length === 1 ? 'form' : 'forms';
  document.getElementById('monthItems').textContent = totalItems;
  
  const list = document.getElementById('logsList');
  if (monthForms.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div class="text">本月还没有记录</div></div>';
    return;
  }
  
  list.innerHTML = monthForms.map(f => `
    <div class="log-entry" data-id="${f.id}">
      <div class="head">
        <div>
          <div class="ref">${f.refNo ? '#' + escapeHtml(f.refNo) : ''}</div>
          <div class="customer">${escapeHtml(f.customer || '(无客户名)')}</div>
        </div>
        ${f.model ? `<div class="model">${escapeHtml(f.model)}</div>` : ''}
      </div>
      <div class="items">
        ${f.items.map(it => `<div class="item-tag">${escapeHtml(it.name)}<span class="qty">×${it.qty}</span></div>`).join('')}
      </div>
      <div class="date">${f.date}</div>
    </div>
  `).join('');
  
  list.querySelectorAll('.log-entry').forEach(el => {
    el.addEventListener('click', () => openDetail(parseInt(el.dataset.id)));
  });
}

document.getElementById('logsMonthPicker').addEventListener('change', renderLogs);

let trendChart;

async function renderStats() {
  const all = await Data.getAllForms();
  const months = [...new Set(all.map(f => f.date.slice(0, 7)))].sort().reverse();
  if (months.length === 0) months.push(todayStr().slice(0, 7));
  const picker = document.getElementById('statsMonthPicker');
  const prev = picker.value;
  picker.innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join('');
  if (prev && months.includes(prev)) picker.value = prev;
  
  const month = picker.value;
  const monthForms = all.filter(f => f.date.startsWith(month));
  
  const list = document.getElementById('statsList');
  
  if (monthForms.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">📊</div><div class="text">本月还没有数据</div></div>';
    renderTrendChart([]);
    return;
  }
  
  let stats = {};
  if (statMode === 'parts') {
    monthForms.forEach(f => f.items.forEach(it => {
      const norm = normalizePart(it.name);
      if (!norm) return;
      if (!stats[norm]) stats[norm] = { name: it.name, qty: 0 };
      stats[norm].qty += it.qty;
    }));
  } else if (statMode === 'customers') {
    monthForms.forEach(f => {
      const key = (f.customer || '(无客户)').trim();
      if (!stats[key]) stats[key] = { name: key, qty: 0, forms: 0 };
      stats[key].qty += f.items.reduce((s, it) => s + it.qty, 0);
      stats[key].forms += 1;
    });
  } else if (statMode === 'models') {
    monthForms.forEach(f => {
      const key = (f.model || '(无型号)').trim();
      if (!stats[key]) stats[key] = { name: key, qty: 0, forms: 0 };
      stats[key].qty += f.items.reduce((s, it) => s + it.qty, 0);
      stats[key].forms += 1;
    });
  }
  
  const arr = Object.values(stats).sort((a, b) => b.qty - a.qty);
  const max = Math.max(...arr.map(s => s.qty), 1);
  
  list.innerHTML = arr.map(s => `
    <div class="stat-row">
      <div class="name">${escapeHtml(s.name)}${s.forms ? ` <span style="color: var(--text-3); font-size: 12px;">· ${s.forms} 张</span>` : ''}</div>
      <div class="bar-wrap"><div class="bar" style="width: ${(s.qty / max * 100).toFixed(1)}%;"></div></div>
      <div class="qty">${s.qty}</div>
    </div>
  `).join('');
  
  renderTrendChart(monthForms, month);
}

function renderTrendChart(forms, month) {
  if (!month) {
    if (trendChart) { trendChart.destroy(); trendChart = null; }
    return;
  }
  const today = new Date();
  const [y, m] = month.split('-').map(Number);
  const daysInMonth = new Date(y, m, 0).getDate();
  
  const labels = [];
  const data = [];
  for (let d = 1; d <= daysInMonth; d++) {
    labels.push(d);
    const ds = `${month}-${String(d).padStart(2,'0')}`;
    data.push(forms.filter(f => f.date === ds).length);
  }
  
  if (trendChart) trendChart.destroy();
  const ctx = document.getElementById('trendChart').getContext('2d');
  trendChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: 'rgba(78, 205, 196, 0.7)',
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }},
      scales: {
        y: { beginAtZero: true, grid: { color: '#1f2a3a' }, ticks: { color: '#5a6b85', stepSize: 1, font: { family: 'JetBrains Mono', size: 10 }}},
        x: { grid: { display: false }, ticks: { color: '#5a6b85', maxTicksLimit: 10, font: { family: 'JetBrains Mono', size: 10 }}}
      }
    }
  });
}

document.getElementById('saveTechName').addEventListener('click', async () => {

// CSV export
document.getElementById('exportCsv').addEventListener('click', async () => {
  const all = await Data.getAllForms();
  if (all.length === 0) { showToast('暂无数据'); return; }
  
  // CSV: each item is a row
  const headers = ['Date', 'Ref No', 'Customer', 'Model', 'Part', 'Qty'];
  const rows = [];
  all.forEach(f => {
    f.items.forEach(it => {
      rows.push([f.date, f.refNo || '', f.customer || '', f.model || '', it.name, it.qty]);
    });
  });
  
  const csv = '\uFEFF' + [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `spare_parts_${todayStr()}.csv`;
  a.click();
  showToast('✓ CSV 已下载');
});

// JSON export
document.getElementById('exportJson').addEventListener('click', async () => {
  const all = await Data.getAllForms();
  const dictParts = await Data.getDict('part');
  const dictCustomers = await Data.getDict('customer');
  const dictModels = await Data.getDict('model');
  const blob = new Blob([JSON.stringify({
    exportedAt: new Date().toISOString(),
    forms: all,
    dict: { parts: dictParts, customers: dictCustomers, models: dictModels }
  }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `spare_parts_backup_${todayStr()}.json`;
  a.click();
  showToast('✓ 备份已下载');
});

// JSON import
document.getElementById('importJsonBtn').addEventListener('click', () => document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  if (!confirm('导入会合并到现有数据(不覆盖)。继续吗?')) return;
  try {
    const data = JSON.parse(await file.text());
    let count = 0;
    for (const f of (data.forms || [])) {
      delete f.id;
      await Data.addForm(f);
      count++;
    }
    if (data.dict) {
      for (const p of (data.dict.parts || [])) await Data.bumpDict('part', p.name);
      for (const c of (data.dict.customers || [])) await Data.bumpDict('customer', c.name);
      for (const m of (data.dict.models || [])) await Data.bumpDict('model', m.name);
    }
    showToast(`✓ 已导入 ${count} 张表`);
    renderSettings();
  } catch (err) {
    showToast('导入失败: ' + err.message);
  }
});

document.getElementById('clearData').addEventListener('click', async () => {
  if (!confirm('⚠ 此操作会删除所有表单和字典。确定吗?')) return;
  if (!confirm('再次确认:真的删除所有数据?')) return;
  await Data.clearAllForms();
  showToast('已清空');
  renderSettings();
});
